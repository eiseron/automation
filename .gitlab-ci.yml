# The release-tag job runs this repo's own CLI to tag itself (it cannot consume
# stack/ci's release template — that template installs *this* gem, which would
# be circular). The GitHub mirror is consumed pinned from stack/ci.
include:
  - project: eiseron/stack/ci
    file: /templates/sync-github.yml
    ref: v0.1.0

stages:
  - lint
  - test
  - release
  - sync

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

rubocop:
  stage: lint
  image: ruby:3.3-alpine
  tags:
    - self-hosted
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - apk add --no-cache build-base
  script:
    - bundle install --jobs 4
    - bundle exec rubocop

test:
  stage: test
  image: ruby:3.3-alpine
  tags:
    - self-hosted
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - apk add --no-cache build-base
  script:
    - bundle install --jobs 4
    - bundle exec rake test

release-tag:
  stage: release
  image: ruby:3.3-alpine
  tags:
    - self-hosted
  cache: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - VERSION
    - if: $CI_COMMIT_BRANCH =~ /^release\//
      changes:
        - VERSION
  script:
    - ruby -Ilib bin/eiseron release tag
