# The release-tag job runs this repo's own CLI to tag itself (it cannot consume
# stack/ci's release template — that template installs *this* gem, which would
# be circular). The GitHub mirror is consumed pinned from stack/ci.
include:
  - project: eiseron/stack/ci
    file: /templates/sync-github.yml
    ref: v0.1.0

stages:
  - lint
  - test
  - release
  - build
  - sync

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

rubocop:
  stage: lint
  image: ruby:3.3-alpine
  tags:
    - self-hosted
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - apk add --no-cache build-base
  script:
    - bundle install --jobs 4
    - bundle exec rubocop

test:
  stage: test
  image: ruby:3.3-alpine
  tags:
    - self-hosted
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - apk add --no-cache build-base
  script:
    - bundle install --jobs 4
    - bundle exec rake test

# Loads the gem the way release-tag does — `ruby -Ilib`, no bundle install, no
# deps — so an eager `require` of a non-stdlib gem fails here on the MR instead
# of silently killing the next release-tag (how v0.8.0 was lost). Runtime deps
# must be required lazily inside the command that needs them.
load-without-deps:
  stage: lint
  image: ruby:3.3-alpine
  tags:
    - self-hosted
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - ruby -Ilib -e 'require "eiseron_automation"; EiseronAutomation::CLI'

release-tag:
  stage: release
  image: ruby:3.3-alpine
  tags:
    - self-hosted
  cache: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - VERSION
    - if: $CI_COMMIT_BRANCH =~ /^release\//
      changes:
        - VERSION
  script:
    - ruby -Ilib bin/eiseron release tag

build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.21.1-debug
    entrypoint: [""]
  tags:
    - self-hosted
  cache: []
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Dockerfile
        - eiseron_automation.gemspec
        - .gitlab-ci.yml
  script:
    - AUTH_B64=$(printf 'gitlab-ci-token:%s' "$CI_JOB_TOKEN" | base64 | tr -d '\n')
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$AUTH_B64\"}}}" > /kaniko/.docker/config.json
    - |
      CACHE_FLAGS="--cache=true --cache-repo=$CI_REGISTRY_IMAGE/kaniko-cache --cache-ttl=168h"
      if [ -n "$CI_COMMIT_TAG" ]; then
        /kaniko/executor \
          --context "$CI_PROJECT_DIR" \
          --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
          --destination "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" \
          --destination "$CI_REGISTRY_IMAGE:latest" \
          --push-retry=3 \
          $CACHE_FLAGS
      else
        /kaniko/executor \
          --context "$CI_PROJECT_DIR" \
          --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
          --no-push \
          $CACHE_FLAGS
      fi
