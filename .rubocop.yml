require:
  - ./rubocop/eiseron/no_comments.rb

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  SuggestExtensions: false
  Exclude:
    - rubocop/**/*

Eiseron/NoComments:
  Enabled: true

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Metrics/MethodLength:
  Max: 20

Metrics/AbcSize:
  Max: 20

Gemspec/DevelopmentDependencies:
  Enabled: false

Metrics/ClassLength:
  Exclude:
    - test/**/*
    - lib/eiseron_automation/cli.rb
